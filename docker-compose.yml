version: '3.8'
services:

  # Container Aplikasi (Laravel)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app
    container_name: app-container
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - sectoral-network

  # Container Web Server (Nginx)
  nginx:
    image: nginx:alpine
    container_name: nginx-container
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    networks:
      - sectoral-network

  # Container Database (MySQL)
  db:
    image: mysql:8.0
    container_name: db-container
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "3306:3306"
    networks:
      - sectoral-network

networks:
  sectoral-network:
    driver: bridge