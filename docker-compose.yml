version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sectoral-hub
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache

    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=sectoralhub
      - DB_USERNAME=user
      - DB_PASSWORD=123456

    networks:
      - sectoralhub

    depends_on:
      - db


  nginx: 
    image: nginx:alpine
    container_name: sectoralhub_nginx
    restart: unless-stopped
    ports:
      - "7788:80"

    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - sectoralhub

  db:
    image: mysql:8.0
    container_name: sectoralhub_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: sectoralhub
      MYSQL_USER: user
      MYSQL_PASSWORD: 123456
    command:
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "5533:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sectoralhub
  
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: sectoralhub_pma
    restart: unless-stopped
    ports:
      - "9988:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    networks:
      - sectoralhub

networks:
  sectoralhub:
    driver: bridge
volumes:
  db_data:
    driver: local


